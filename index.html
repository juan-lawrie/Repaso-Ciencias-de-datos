<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evaluación Estadística - Ciencia de Datos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <main class="mx-auto max-w-6xl px-4 py-8 md:px-8">
      <header class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Evaluación universitaria</p>
        <h1 class="mt-2 text-2xl font-bold text-slate-900 md:text-3xl">Examen de Estadística (15 ejercicios)</h1>
        <p class="mt-3 text-sm text-slate-600">
          Resolvé los 15 ejercicios del temario. Al final presioná <strong>Corregir Examen</strong> para ver tu puntaje,
          respuestas correctas/incorrectas y explicación de cada punto.
        </p>
      </header>

      <section class="mt-6 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div id="result-summary" class="mb-6 hidden rounded-xl border border-indigo-200 bg-indigo-50 p-4 text-sm text-indigo-900"></div>

        <form id="exam-form" class="space-y-6" novalidate>
          <div id="questions-container" class="space-y-6"></div>

          <div class="sticky bottom-4 z-10 rounded-xl border border-slate-200 bg-white/95 p-4 shadow-lg backdrop-blur">
            <button
              id="grade-btn"
              type="submit"
              class="w-full rounded-lg bg-indigo-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-indigo-700"
            >
              Corregir Examen
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
